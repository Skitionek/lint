name: Copilot Auto-Fix on CI Failure

on:
  workflow_dispatch:
    inputs:
      workflow-name:
        description: Name of the failing workflow.
        required: true
        type: string
      branch-name:
        description: Branch containing the fix target.
        required: true
        type: string
      head-sha:
        description: Commit SHA to check out before generating a fix.
        required: true
        type: string
      run-url:
        description: URL of the failing workflow run.
        required: true
        type: string
      pr-number:
        description: Pull request number to comment on after creating the fix PR.
        required: false
        type: string

permissions: read-all

jobs:
  copilot-fix:
    name: Copilot Auto-Fix
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout failing branch
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ inputs.head-sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: lts/*

      - name: Install Copilot CLI
        run: npm install -g @github/copilot

      - name: Run Copilot CLI to fix failing tests
        # COPILOT_TOKEN must be a fine-grained PAT with the "Copilot Requests" permission.
        # Store it as a repository secret named COPILOT_TOKEN.
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_TOKEN }}
          WORKFLOW_NAME: ${{ inputs.workflow-name }}
          BRANCH_NAME: ${{ inputs.branch-name }}
          RUN_URL: ${{ inputs.run-url }}
        run: |
          copilot -p "The CI workflow '${WORKFLOW_NAME}' is failing on branch '${BRANCH_NAME}' (run: ${RUN_URL}). \
          Run the tests to see exactly what is failing, then fix the source code so all tests pass. \
          Do not modify any test files — only fix the implementation." \
            --allow-tool='write,shell(npm:*),shell(npx:*),shell(yarn:*),shell(git:*)' \
            --no-ask-user

      - name: Create PR with Copilot fixes
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        id: cpr
        with:
          # PAT is preferred so the fix PR triggers downstream CI workflows.
          # Falls back to GITHUB_TOKEN if PAT is not set.
          token: ${{ secrets.PAT || secrets.GITHUB_TOKEN }}
          commit-message: "fix(ci): apply Copilot auto-fix for failing tests"
          title: "fix(ci): Copilot auto-fix for failing tests on ${{ inputs.branch-name }}"
          labels: |
            bot
            copilot-fix
          branch: copilot-fix/${{ inputs.branch-name }}
          body: |
            Automated fix generated by GitHub Copilot CLI for failing tests.

            **Workflow run:** ${{ inputs.run-url }}
            **Branch:** `${{ inputs.branch-name }}`

            Please review the changes and merge if they are correct.
          base: ${{ inputs.branch-name }}

      - name: Post fix-PR link as comment on original PR
        if: steps.cpr.outputs.pull-request-url != '' && inputs.pr-number != ''
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        env:
          FIX_PR_URL: ${{ steps.cpr.outputs.pull-request-url }}
          PR_NUMBER: ${{ inputs.pr-number }}
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number(process.env.PR_NUMBER),
              body: `🤖 Copilot has automatically generated a fix for the failing tests.\n\nFix PR: ${process.env.FIX_PR_URL}`
            });
