name: Lint

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# Default to read-only; individual jobs grant only the permissions they need.
permissions: read-all

jobs:
  megalinter:
    name: MegaLinter
    runs-on: ubuntu-latest
    permissions:
      contents: write # needed to commit auto-fixes
      issues: write
      pull-requests: write
      security-events: write # needed to upload SARIF

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Run lint action from this repository
        uses: ./
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          pat: ${{ secrets.PAT }}

      # ── Upload SARIF for PR annotations ───────────────────────────────────
      - name: Upload SARIF report
        if: >
          (github.event_name == 'pull_request' || github.event_name == 'push') &&
          always()
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        # continue-on-error so the job doesn't fail when SARIF wasn't produced
        # (e.g. no linting errors were found, or the reporter was not enabled).
        continue-on-error: true
        with:
          sarif_file: megalinter-reports/megalinter-report.sarif
          category: megalinter
