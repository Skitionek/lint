name: Lint
description: Run MegaLinter with dynamic flavor detection and optional auto-fix PR creation.

inputs:
  github-token:
    description: Token used for checkout, MegaLinter integrations, and fix PR creation.
    required: false
    default: ""
  pat:
    description: Personal access token used by create-pull-request to trigger downstream workflows.
    required: false
    default: ""
  create-fix-pr:
    description: Whether to open a pull request with auto-fixes when changes are produced on pull requests.
    required: false
    default: "true"
  skip-fix-commit-substring:
    description: Skip fix PR creation if head commit message contains this substring.
    required: false
    default: "skip fix"

outputs:
  has_updated_sources:
    description: "1 when linters changed tracked files, otherwise 0."
    value: ${{ steps.ml.outputs.has_updated_sources }}
  fix_pull_request_url:
    description: URL of created fix PR, if any.
    value: ${{ steps.cpr.outputs.pull-request-url }}
  detected_flavor:
    description: Detected MegaLinter flavor.
    value: ${{ steps.detect_flavor.outputs.flavor }}

runs:
  using: composite
  steps:
    - name: Checkout repository
      uses: actions/checkout@v7
      with:
        token: ${{ inputs.github-token != '' && inputs.github-token || github.token }}
        fetch-depth: 0

    - name: Detect MegaLinter flavor
      id: detect_flavor
      shell: bash
      run: |
        if [[ "${{ github.event_name }}" == "pull_request" ]]; then
          CHANGED=$(git diff --name-only "origin/${{ github.base_ref }}"...HEAD 2>/dev/null || true)
        else
          CHANGED=$(git diff --name-only HEAD~1 2>/dev/null || true)
        fi
        echo "Changed files:"
        echo "${CHANGED:-<none>}"
        LANGS=()
        if [[ -n "$CHANGED" ]]; then
          grep -qiE '\.(py|ipynb|pyx|pyi)$'                  <<< "$CHANGED" && LANGS+=(python)
          grep -qiE '\.(js|ts|jsx|tsx|mjs|cjs|vue|svelte)$' <<< "$CHANGED" && LANGS+=(javascript)
          grep -qiE '\.java$'                               <<< "$CHANGED" && LANGS+=(java)
          grep -qiE '\.go$'                                 <<< "$CHANGED" && LANGS+=(go)
          grep -qiE '\.rb$'                                 <<< "$CHANGED" && LANGS+=(ruby)
          grep -qiE '\.php$'                                <<< "$CHANGED" && LANGS+=(php)
          grep -qiE '\.rs$'                                 <<< "$CHANGED" && LANGS+=(rust)
          grep -qiE '\.(cs|vb|fs|fsx)$'                     <<< "$CHANGED" && LANGS+=(dotnet)
          grep -qiE '\.(tf|tfvars)$'                        <<< "$CHANGED" && LANGS+=(terraform)
          grep -qiE '\.swift$'                              <<< "$CHANGED" && LANGS+=(swift)
        fi
        if [[ ${#LANGS[@]} -eq 1 ]]; then
          FLAVOR="${LANGS[0]}"
          IMAGE="docker://ghcr.io/oxsecurity/megalinter-${FLAVOR}:v9.5.0"
        else
          FLAVOR="all"
          IMAGE="docker://ghcr.io/oxsecurity/megalinter:v9.5.0"
        fi
        echo "Detected flavor: $FLAVOR (matched languages: ${LANGS[*]:-none})"
        echo "flavor=$FLAVOR" >> "$GITHUB_OUTPUT"
        echo "image=$IMAGE"   >> "$GITHUB_OUTPUT"

    - name: Create dynamic MegaLinter action
      shell: bash
      run: |
        mkdir -p .github/actions/_megalinter
        printf 'name: MegaLinter (%s)\ndescription: Run MegaLinter\nruns:\n  using: docker\n  image: "%s"\n' \
          "${{ steps.detect_flavor.outputs.flavor }}" \
          "${{ steps.detect_flavor.outputs.image }}" \
          > .github/actions/_megalinter/action.yml
        echo "Generated action.yml:"
        cat .github/actions/_megalinter/action.yml

    - name: Run MegaLinter
      id: ml_run
      uses: ./.github/actions/_megalinter
      continue-on-error: true
      env:
        VALIDATE_ALL_CODEBASE: ${{ github.event_name == 'push' }}
        GITHUB_TOKEN: ${{ inputs.github-token != '' && inputs.github-token || github.token }}
        GITHUB_COMMENT_REPORTER: false
        SARIF_REPORTER: true

    - name: Clean up dynamic action
      if: always()
      shell: bash
      run: rm -rf .github/actions/_megalinter

    - name: Collect MegaLinter result
      id: ml
      shell: bash
      run: |
        if git diff --quiet; then
          echo "has_updated_sources=0" >> "$GITHUB_OUTPUT"
        else
          echo "has_updated_sources=1" >> "$GITHUB_OUTPUT"
        fi

    - name: Set fix-PR flag
      id: fix_check
      shell: bash
      env:
        HAS_UPDATES: ${{ steps.ml.outputs.has_updated_sources }}
        IS_PR: ${{ github.event_name == 'pull_request' }}
        SAME_REPO: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
        SKIP_FIX: ${{ contains(github.event.head_commit.message, inputs.skip-fix-commit-substring) }}
        CREATE_FIX_PR: ${{ inputs.create-fix-pr }}
      run: |
        if [[ "$CREATE_FIX_PR" == "true" && "$HAS_UPDATES" == "1" && "$IS_PR" == "true" && "$SAME_REPO" == "true" && "$SKIP_FIX" != "true" ]]; then
          echo "enabled=true" >> "$GITHUB_OUTPUT"
        else
          echo "enabled=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Create Pull Request with applied fixes
      uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
      id: cpr
      if: steps.fix_check.outputs.enabled == 'true'
      with:
        token: ${{ inputs.pat != '' && inputs.pat || inputs.github-token != '' && inputs.github-token || github.token }}
        commit-message: "[MegaLinter] Apply linters automatic fixes"
        title: "[MegaLinter] Apply linters automatic fixes"
        labels: bot
        branch: megalinter-fixes-pr-${{ github.event.pull_request.number }}
        body: |
          MegaLinter has automatically applied linters fixes on this PR.
          Please review the changes and merge if they are correct.
        base: ${{ github.head_ref }}

    - name: Post PR comment
      if: steps.fix_check.outputs.enabled == 'true'
      uses: marocchino/sticky-pull-request-comment@0ea0beb66eb9baf113663a64ec522f60e49231c0 # v2
      with:
        message: |
          MegaLinter has automatically applied linters fixes on this PR.
          Please review the changes and merge if they are correct.
          PR: ${{ steps.cpr.outputs.pull-request-url }}
        hide_and_recreate: true

    - name: Fail if PR created
      if: steps.fix_check.outputs.enabled == 'true' && steps.cpr.outputs.pull-request-url != ''
      shell: bash
      run: |
        echo "A PR with formatting fixes has been created. Please merge it before proceeding."
        echo "PR: ${{ steps.cpr.outputs.pull-request-url }}"
        exit 1

    - name: Fail if MegaLinter failed
      if: always() && steps.ml_run.outcome == 'failure'
      shell: bash
      run: |
        echo "MegaLinter found linting issues. Review the MegaLinter output above for details."
        exit 1
