# MegaLinter configuration
# https://megalinter.io/latest/configuration/

# Spelling linters report warnings instead of blocking the build
DISABLE_ERRORS_LINTERS:
  - SPELL_CODESPELL
  - SPELL_CSPELL
  - SPELL_LYCHEE
  - SPELL_MISSPELL
  - SPELL_PROSELINT
  - SPELL_VALE
  - ACTION_ZIZMOR

# Allow zizmor to use the workflow token for GitHub API-backed audits
ACTION_ZIZMOR_UNSECURED_ENV_VARIABLES:
  - GITHUB_TOKEN

# This repository does not contain package manifests for osv-scanner
DISABLE_LINTERS:
  - REPOSITORY_OSV_SCANNER
